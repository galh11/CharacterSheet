name: Update visual baselines

# One-shot helper: regenerate the Playwright visual-regression baselines on a
# Linux runner (the same OS CI uses) and upload them as an artifact. Font
# rendering differs between Windows and Linux, so the committed Windows
# baselines can't be reused on CI — this produces the matching Linux images.
#
# Usage:
#   1. Run this workflow (Actions → "Update visual baselines" → Run workflow).
#   2. Download the "linux-visual-baselines" artifact and unzip its PNGs into
#      e2e/visual.spec.ts-snapshots/.
#   3. Commit the *-chromium-linux.png files in a normal pull request.
# Once committed, the CI "Visual regression tests" step starts gating on them
# automatically (no further workflow change needed).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # In update mode Playwright writes any missing/changed snapshots for the
      # current platform (linux) and the run passes.
      - name: Generate Linux visual baselines
        run: npx playwright test e2e/visual.spec.ts --update-snapshots

      - name: Upload Linux baselines
        uses: actions/upload-artifact@v5
        with:
          name: linux-visual-baselines
          path: e2e/visual.spec.ts-snapshots/*-chromium-linux.png
          if-no-files-found: error
          retention-days: 14
