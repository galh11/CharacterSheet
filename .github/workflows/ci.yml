name: CI

on:
  push:
    branches: [main]
  pull_request:
    # `labeled`/`edited` are included so adding the `update-visuals` label — or
    # putting `[update-visuals]` in the PR title/body (which automated agents can
    # do, since they can't always apply labels) — re-runs CI and regenerates the
    # visual baselines without needing a new commit.
    types: [opened, synchronize, reopened, labeled, edited]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      # `contents: write` lets a PR labeled `update-visuals` commit its refreshed
      # Linux visual baselines back to its own branch.
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          # Check out the PR branch head (not the ephemeral merge commit) so the
          # baseline-refresh step below can commit and push back to the branch.
          # Empty on push events → checkout falls back to the pushed ref.
          ref: ${{ github.head_ref }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Docs freshness check
        run: npm run check:docs

      - name: Type-check & build
        run: npm run build

      - name: Unit / component tests
        run: npm run test:run

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests (functional)
        run: npx playwright test e2e/app.spec.ts

      # Visual regression gates on the committed Linux baselines
      # (`*-chromium-linux.png`; font rendering differs from the Windows ones, so
      # they can't be shared). A PR that *intends* to change the UI adds the
      # Visual regression gates on the committed Linux baselines
      # (`*-chromium-linux.png`; font rendering differs from the Windows ones, so
      # they can't be shared). A PR that *intends* to change the UI opts in either
      # by adding the **`update-visuals`** label (easiest for humans) or by putting
      # **`[update-visuals]`** in the PR title (easiest for automated agents, which
      # can't always apply labels). CI then regenerates those baselines with
      # `--update-snapshots` and commits them back to the branch instead of failing
      # the pixel diff. PRs that don't opt in keep gating; the push of refreshed
      # baselines uses GITHUB_TOKEN (so it doesn't re-trigger CI), and auto-merge
      # merges the branch head — baselines included — once this run succeeds.
      # (Detection reads the title, not the body, so the PR template's mention of
      # the marker doesn't accidentally opt every PR in.)
      - name: Visual regression tests
        env:
          UPDATE_VISUALS: ${{ (contains(github.event.pull_request.labels.*.name, 'update-visuals') || contains(github.event.pull_request.title, '[update-visuals]')) && github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          set -euo pipefail
          if [ "${UPDATE_VISUALS}" = "true" ]; then
            echo "update-visuals opt-in detected — regenerating Linux baselines."
            npx playwright test e2e/visual.spec.ts --update-snapshots
            if [ -n "$(git status --porcelain e2e/visual.spec.ts-snapshots)" ]; then
              git config user.name 'github-actions[bot]'
              git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
              git add e2e/visual.spec.ts-snapshots
              git commit -m 'test(visual): refresh Linux baselines [skip ci]'
              git push origin "HEAD:${{ github.head_ref }}"
              echo "Committed refreshed baselines back to ${{ github.head_ref }}."
            else
              echo "Baselines already match — nothing to update."
            fi
          elif ls e2e/visual.spec.ts-snapshots/*-chromium-linux.png >/dev/null 2>&1; then
            echo "Linux baselines present — running visual regression."
            npx playwright test e2e/visual.spec.ts
          else
            echo "No Linux baselines yet — skipping visual regression."
            echo "Opt in with the 'update-visuals' label or '[update-visuals]' in the PR title/body (or run the 'Update visual baselines' workflow) to generate them."
          fi

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
