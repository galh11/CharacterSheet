name: Deploy to GitHub Pages

on:
  # Direct pushes to main by a human (the maintainer) deploy straight away.
  push:
    branches: [main]
  # PR auto-merges push to main using GITHUB_TOKEN, which — by GitHub's recursion
  # guard — does NOT fire the `push` trigger above. So also deploy after the
  # Auto-merge workflow finishes (it squash-merges the PR into main first, then
  # completes), which reliably ships every merged PR.
  workflow_run:
    workflows: [Auto-merge]
    types: [completed]
  # Allow manual deploys from the Actions tab.
  workflow_dispatch:

# Permissions required by the Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent Pages deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Skip the auto-merge path when it didn't actually merge (e.g. CI failed, or
    # there was no open PR); push and manual dispatch always build.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        # workflow_run reports the triggering run's SHA; always build the latest
        # main (which now includes the just-merged PR).
        with:
          ref: main

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v5

      - name: Upload built site
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
