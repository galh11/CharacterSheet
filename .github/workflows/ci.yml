name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Docs freshness check
        run: npm run check:docs

      - name: Type-check & build
        run: npm run build

      - name: Unit / component tests
        run: npm run test:run

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests (functional)
        run: npx playwright test e2e/app.spec.ts

      # Visual regression only runs once Linux baselines are committed (they can't
      # be reused from the Windows baselines because font rendering differs).
      # Generate them with the "Update visual baselines" workflow, then commit the
      # *-chromium-linux.png files — this step then starts gating automatically.
      - name: Visual regression tests
        run: |
          if ls e2e/visual.spec.ts-snapshots/*-chromium-linux.png >/dev/null 2>&1; then
            echo "Linux baselines present — running visual regression."
            npx playwright test e2e/visual.spec.ts
          else
            echo "No Linux baselines yet — skipping visual regression."
            echo "Run the 'Update visual baselines' workflow and commit the generated *-chromium-linux.png files to enable this gate."
          fi

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
